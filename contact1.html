<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا | AI NEXUS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6">
    <nav class="max-w-4xl mx-auto flex justify-between items-center mb-16">
        <a href="/" class="text-2xl font-black text-blue-400">AI NEXUS PRO</a>
        <a href="/" class="text-sm text-gray-400 hover:text-white transition">الرئيسية ←</a>
    </nav>

    <div class="max-w-2xl mx-auto glass p-10 rounded-3xl shadow-2xl">
        <h1 class="text-3xl font-black mb-6 text-center">تواصل معنا</h1>
        <p class="text-gray-400 text-center mb-10">لديك اقتراح أو واجهت مشكلة تقنية؟ نحن هنا للمساعدة.</p>

        <form action="#" class="space-y-6">
            <div>
                <label class="block text-sm font-bold mb-2">الاسم الكامل</label>
                <input type="text" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none" placeholder="أدخل اسمك هنا">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">البريد الإلكتروني</label>
                <input type="email" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none" placeholder="email@example.com">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">رسالتك</label>
                <textarea class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 h-32 focus:border-blue-500 outline-none" placeholder="كيف يمكننا مساعدتك؟"></textarea>
            </div>
            <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-blue-500/20">إرسال الرسالة</button>
        </form>

        <div class="mt-10 flex justify-center gap-6 text-gray-500">
            <a href="#" class="hover:text-blue-500 text-2xl"><i class="fab fa-facebook"></i></a>
            <a href="#" class="hover:text-green-500 text-2xl"><i class="fab fa-whatsapp"></i></a>
            <a href="mailto:support@ainexuspro.com" class="hover:text-red-500 text-2xl"><i class="fas fa-envelope"></i></a>
        </div>
    </div>
</body>
</html>
