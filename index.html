<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6119422909390809"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NEXUS PRO - منصة الذكاء الاصطناعي الشاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <nav class="glass sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">AI NEXUS PRO</h1>
            <div class="space-x-4 space-x-reverse">
                <a href="/" class="hover:text-blue-400">الرئيسية</a>
                <a href="/policy.html" class="hover:text-blue-400 text-sm">سياسة الخصوصية</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12">
        <div class="text-center mb-16">
            <h2 class="text-4xl md:text-6xl font-extrabold mb-4">مساعدك الذكي للإبداع</h2>
            <p class="text-gray-400 text-xl">أدوات متطورة لتحسين محركات البحث وكتابة المحتوى بالذكاء الاصطناعي</p>
        </div>

        <div class="max-w-3xl mx-auto glass p-8 rounded-2xl shadow-2xl">
            <div class="mb-6">
                <label class="block mb-2 text-blue-400">ماذا تريد أن تكتب اليوم؟</label>
                <textarea id="userInput" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:border-blue-500 outline-none h-32" placeholder="مثال: اكتب لي مقالاً عن فوائد الذكاء الاصطناعي..."></textarea>
            </div>
            
            <button onclick="generateAI()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition duration-300 flex items-center justify-center space-x-2">
                <i class="fas fa-magic ml-2"></i>
                <span>توليد المحتوى الآن</span>
            </button>

            <div id="resultContainer" class="mt-8 hidden">
                <h3 class="text-blue-400 mb-2">النتيجة:</h3>
                <div id="output" class="p-4 bg-slate-800 rounded-xl border border-blue-500/30 text-gray-200 leading-relaxed whitespace-pre-wrap"></div>
            </div>
        </div>
    </main>

    <footer class="text-center py-8 text-gray-500 border-t border-slate-800 mt-20">
        <p>© 2026 AI NEXUS PRO - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        async function generateAI() {
            const input = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            const container = document.getElementById('resultContainer');
            const btn = document.getElementById('btn');

            if(!input) return alert("يرجى كتابة شيء ما!");

            btn.disabled = true;
            btn.innerHTML = "جاري المعالجة...";

            try {
                const response = await fetch('https://gogo24173-ai-nexus-server.hf.space/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: input, type: "General Content Creator" })
                });

                const data = await response.json();
                container.classList.remove('hidden');
                output.innerText = data.result || "حدث خطأ في جلب البيانات.";
            } catch (err) {
                alert("السيرفر لا يستجيب، تأكد من أن Hugging Face في وضع Running");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic ml-2"></i><span>توليد المحتوى الآن</span>';
            }
        }
    </script>
</body>
</html>
