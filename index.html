<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NEXUS PRO - منصة الذكاء الاصطناعي العربية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; scroll-behavior: smooth; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(to r, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <nav class="glass sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold gradient-text">AI NEXUS PRO</h1>
            <div class="hidden md:flex space-x-6 space-x-reverse text-sm">
                <a href="#" class="hover:text-blue-400">الرئيسية</a>
                <a href="#tools" class="hover:text-blue-400">الأدوات</a>
                <a href="/policy.html" class="hover:text-blue-400">سياسة الخصوصية</a>
            </div>
        </div>
    </nav>

    <header class="py-20 text-center">
        <h2 class="text-5xl font-extrabold mb-4">مستقبل الإبداع بين يديك</h2>
        <p class="text-gray-400 text-lg max-w-2xl mx-auto px-4">حول أفكارك إلى محتوى احترافي، ترجم النصوص، وحسن ترتيبك في محركات البحث باستخدام أقوى تقنيات الذكاء الاصطناعي.</p>
    </header>

    <main id="tools" class="container mx-auto px-4 pb-20">
        <div class="max-w-4xl mx-auto glass p-8 rounded-3xl shadow-2xl border-blue-500/20">
            
            <div class="mb-8 flex flex-wrap gap-4 justify-center">
                <button onclick="setType('Translator', 'مترجم احترافي')" class="tool-btn bg-blue-600 px-6 py-2 rounded-full font-bold">مترجم فوري</button>
                <button onclick="setType('SEO Expert', 'خبير سيو')" class="tool-btn bg-slate-800 px-6 py-2 rounded-full">محسن محركات البحث</button>
                <button onclick="setType('Content Writer', 'كاتب محتوى')" class="tool-btn bg-slate-800 px-6 py-2 rounded-full">كاتب مقالات</button>
            </div>

            <div class="mb-6">
                <label id="inputLabel" class="block mb-3 text-blue-400 font-bold">أدخل النص للترجمة أو المعالجة:</label>
                <textarea id="userInput" class="w-full p-5 rounded-2xl bg-slate-900 border border-slate-700 focus:border-blue-500 outline-none h-40 transition-all" placeholder="اكتب نصك هنا..."></textarea>
            </div>
            
            <button onclick="generateAI()" id="btn" class="w-full bg-gradient-to-l from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-4 rounded-2xl transition duration-300 transform hover:scale-[1.02]">
                <i class="fas fa-bolt ml-2"></i>
                <span id="btnText">بدء المعالجة الذكية</span>
            </button>

            <div id="resultArea" class="mt-10 hidden">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-purple-400 font-bold"><i class="fas fa-check-circle ml-1"></i> النتيجة النهائية:</span>
                    <button onclick="copyText()" class="text-xs bg-slate-700 px-3 py-1 rounded hover:bg-slate-600">نسخ النص</button>
                </div>
                <div id="output" class="p-6 bg-slate-900/80 rounded-2xl border border-blue-500/30 text-gray-100 leading-relaxed whitespace-pre-wrap shadow-inner"></div>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 text-gray-500 border-t border-slate-800">
        <p>© 2026 AI NEXUS PRO - جميع الحقوق محفوظة</p>
        <div class="mt-2 space-x-4 space-x-reverse text-sm">
            <a href="/policy.html" class="hover:underline">سياسة الخصوصية</a>
        </div>
    </footer>

    <script>
        let currentType = "Translator";

        function setType(type, label) {
            currentType = type;
            document.getElementById('inputLabel').innerText = "أدخل النص لـ " + label + ":";
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.replace('bg-blue-600', 'bg-slate-800'));
            event.target.classList.replace('bg-slate-800', 'bg-blue-600');
        }

        async function generateAI() {
            const prompt = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            const resultArea = document.getElementById('resultArea');
            const btnText = document.getElementById('btnText');

            if(!prompt) return alert("يرجى كتابة نص أولاً!");

            btnText.innerText = "جاري العمل...";
            
            try {
                const response = await fetch('https://gogo24173-ai-nexus-server.hf.space/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: prompt, type: currentType })
                });

                const data = await response.json();
                resultArea.classList.remove('hidden');
                output.innerText = data.result || "عذراً، لم نتمكن من جلب النتيجة.";
                window.scrollTo(0, document.body.scrollHeight);
            } catch (err) {
                alert("السيرفر لا يستجيب، تأكد من أن Hugging Face باللون الأخضر!");
            } finally {
                btnText.innerText = "بدء المعالجة الذكية";
            }
        }

        function copyText() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text);
            alert("تم نسخ النص بنجاح!");
        }
    </script>
</body>
</html>
