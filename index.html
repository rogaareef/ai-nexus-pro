        *{box-sizing:border-box;transition:.3s;font-family:'Segoe UI', Tahoma, Geneva, sans-serif}
        body{margin:0;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6}

        .btn-group{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .btn{padding:14px;border-radius:12px;border:none;font-weight:800;cursor:pointer;font-size:13px;color:#fff}
        .btn-p{background:var(--p)}.btn-sc{background:var(--sc)}.btn-gold{background:var(--gold);color:#000}
        #res{margin-top:35px;padding:25px;background:#161b22;border-radius:20px;border:2px dashed var(--gold);display:none;white-space:pre-wrap}
        .loader{display:none;width:40px;height:40px;border:4px solid rgba(255,255,255,.1);border-top:4px solid var(--gold);border-radius:50%;animation:sp 1s linear infinite;margin:30px auto}
        @keyframes sp{to{transform:rotate(360deg)}}
